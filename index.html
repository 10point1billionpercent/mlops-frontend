<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walmart Predictions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-image: url(bg.png);
        background-size: cover;
        background-position: center;
        min-height: 100vh;
        color: white;
        font-family: 'Segoe UI', sans-serif;
        padding: 60px 0;
    }

    .glass {
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 8px 64px rgba(69, 255, 125, 0.3);
        }

    .section-card {
        border-radius: 16px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.6);
    }

    .section-title {
        font-size: 1.05rem;
        font-weight: 700;
        margin-bottom: 16px;
    }

    .form-label {
        font-weight: 600;
    }

    .form-control,
    .form-control:focus {
        background: rgba(0, 0, 0, 0.5);
        color: white;
        box-shadow: none;
    }

    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.65);
    }

    .file-input {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    .file-upload {
        display: flex;
        align-items: stretch;
        width: 100%;
        overflow: hidden;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.5);
    }

    .file-upload-button {
        background-color: #0b577a;
        color: white;
        padding: 12px 18px;
        font-weight: 600;
        cursor: pointer;
        user-select: none;
        transition: background-color 0.2s ease;
        margin: 0;
    }

    .file-upload-button:hover,
    .file-upload-button:focus {
        background-color: #0b577a;
        color: white;
    }

    .file-upload-name {
        flex: 1;
        display: flex;
        align-items: center;
        min-height: 48px;
        padding: 0 16px;
        color: rgba(255, 255, 255, 0.82);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .btn-primary,
    .btn-primary:hover,
    .btn-primary:active,
    .btn-primary:focus {
        background-color: #0b577a;
        border: none;
    }

    .helper-text {
        color: rgba(255, 255, 255, 0.75);
        font-size: 0.9rem;
    }

    #status.success,
    #status.error {
        padding: 10px;
        border-radius: 10px;
    }

    #status.success {
        border: 2px solid #32c505;
    }

    #status.error {
        border: 2px solid #c50505;
    }
</style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
            <div class="glass">
                <h3 class="text-center mb-4">Walmart Predictions</h3>

                <div class="mt-3 text-center mb-4" id="status"></div>

                <div class="mb-4">
                    <label class="form-label" for="deploymentLink">Deployment Link</label>
                        <div class="helper-text mb-2">Whatever base URL you paste here will be used for both prediction requests.</div>
                    <input
                        class="form-control"
                        id="deploymentLink"
                        type="url"
                        placeholder="http://localhost:8000"
                    >
                </div>

                <div class="section-card mb-4">
                    <div class="section-title">Single Prediction</div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="store">Store</label>
                            <input class="form-control" id="store" type="number" placeholder="1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="date">Date</label>
                            <input class="form-control" id="date" type="text" placeholder="05-02-2010">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="holidayFlag">Holiday_Flag</label>
                            <input class="form-control" id="holidayFlag" type="number" min="0" max="1" placeholder="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="temperature">Temperature</label>
                            <input class="form-control" id="temperature" type="number" step="any" placeholder="42.31">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="fuelPrice">Fuel_Price</label>
                            <input class="form-control" id="fuelPrice" type="number" step="any" placeholder="2.572">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="cpi">CPI</label>
                            <input class="form-control" id="cpi" type="number" step="any" placeholder="211.0963582">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label" for="unemployment">Unemployment</label>
                            <input class="form-control" id="unemployment" type="number" step="any" placeholder="8.106">
                        </div>
                    </div>

                    <button class="btn btn-primary w-100 mt-4" onclick="sendSinglePrediction()">Send Single Prediction</button>
                </div>

                <div class="section-card">
                    <div class="section-title">Batch Prediction</div>
                    <label class="form-label" for="batchFile">Upload CSV</label>
                    <div class="file-upload">
                        <label class="file-upload-button" for="batchFile">Choose file</label>
                        <div class="file-upload-name" id="batchFileName">No file chosen</div>
                    </div>
                    <input class="file-input" id="batchFile" type="file" accept=".csv,text/csv">
                    <div class="helper-text mt-2">CSV only. Expected columns: Store, Date, Holiday_Flag, Temperature, Fuel_Price, CPI, Unemployment.</div>

                    <button class="btn btn-primary w-100 mt-4" onclick="sendBatchPrediction()">Send Batch Prediction</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function setStatus(message, type) {
    const statusDiv = document.getElementById("status");
    statusDiv.classList.remove("success", "error");
    statusDiv.innerText = message;

    if (type) {
        statusDiv.classList.add(type);
    }
}

function normalizeBaseUrl(url) {
    return url.trim().replace(/\/+$/, "");
}

function getBaseUrl() {
    const baseUrl = normalizeBaseUrl(document.getElementById("deploymentLink").value);

    if (!baseUrl) {
        throw new Error("Please paste the deployment link first.");
    }

    return baseUrl;
}

function getSinglePredictionPayload() {
    return {
        Store: Number(document.getElementById("store").value),
        Date: document.getElementById("date").value.trim(),
        Holiday_Flag: Number(document.getElementById("holidayFlag").value),
        Temperature: Number(document.getElementById("temperature").value),
        Fuel_Price: Number(document.getElementById("fuelPrice").value),
        CPI: Number(document.getElementById("cpi").value),
        Unemployment: Number(document.getElementById("unemployment").value)
    };
}

function validateSinglePredictionPayload(payload) {
    const requiredFields = ["Store", "Date", "Holiday_Flag", "Temperature", "Fuel_Price", "CPI", "Unemployment"];

    for (const field of requiredFields) {
        if (field === "Date" && !payload[field]) {
            throw new Error("Please fill all single prediction fields before sending.");
        }

        if (field !== "Date" && Number.isNaN(payload[field])) {
            throw new Error("Please fill all single prediction fields before sending.");
        }
    }
}

async function postJson(endpoint, body) {
    const response = await fetch(endpoint, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
    });

    let data = null;

    try {
        data = await response.json();
    } catch (error) {
        data = null;
    }

    if (!response.ok) {
        const detail = data && data.detail ? JSON.stringify(data.detail) : `Request failed with status ${response.status}`;
        throw new Error(detail);
    }

    return data;
}

async function sendSinglePrediction() {
    try {
        setStatus("Sending single prediction request...", null);
        const baseUrl = getBaseUrl();
        const payload = getSinglePredictionPayload();
        validateSinglePredictionPayload(payload);
        const data = await postJson(`${baseUrl}/api/v1/predict`, payload);
        setStatus(`Single prediction success: ${JSON.stringify(data)}`, "success");
    } catch (error) {
        setStatus(error.message || "Single prediction failed.", "error");
    }
}

function parseCsvValue(value, key) {
    const cleaned = value.trim();
    return key === "Date" ? cleaned : Number(cleaned);
}

function parseCsvLine(line) {
    return line.split(",").map((part) => part.trim());
}

function parseCsv(csvText) {
    const rows = csvText
        .split(/\r?\n/)
        .map((row) => row.trim())
        .filter(Boolean);

    if (rows.length < 2) {
        throw new Error("CSV must include a header row and at least one data row.");
    }

    const headers = parseCsvLine(rows[0]);
    const requiredHeaders = ["Store", "Date", "Holiday_Flag", "Temperature", "Fuel_Price", "CPI", "Unemployment"];
    const missingHeaders = requiredHeaders.filter((header) => !headers.includes(header));

    if (missingHeaders.length) {
        throw new Error(`CSV is missing required columns: ${missingHeaders.join(", ")}`);
    }

    return rows.slice(1).map((row) => {
        const values = parseCsvLine(row);
        const record = {};

        headers.forEach((header, index) => {
            record[header] = parseCsvValue(values[index] || "", header);
        });

        validateSinglePredictionPayload(record);
        return record;
    });
}

async function sendBatchPrediction() {
    try {
        setStatus("Sending batch prediction request...", null);
        const baseUrl = getBaseUrl();
        const fileInput = document.getElementById("batchFile");
        const file = fileInput.files[0];

        if (!file) {
            throw new Error("Please upload a CSV file for batch prediction.");
        }

        if (!file.name.toLowerCase().endsWith(".csv")) {
            throw new Error("Only CSV files are supported for batch prediction.");
        }

        const csvText = await file.text();
        const records = parseCsv(csvText);
        const data = await postJson(`${baseUrl}/api/v1/predict/batch`, { records });
        setStatus(`Batch prediction success: ${JSON.stringify(data)}`, "success");
    } catch (error) {
        setStatus(error.message || "Batch prediction failed.", "error");
    }
}

document.getElementById("batchFile").addEventListener("change", function (event) {
    const file = event.target.files[0];
    document.getElementById("batchFileName").innerText = file ? file.name : "No file chosen";
});

document.getElementById("deploymentLink").value = "http://localhost:8000";
</script>

</body>
</html>
